<!DOCTYPE html>
<html lang="ru"><head>
<meta charset="utf-8">
<title>Carrot quest — Онбординг</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>/* ─────────────────────────────────────────────────────────────
   Carrot quest — Colors & Type Tokens
   Source: Figma "Carrot quest.fig" (page19 brand guidebook)
   PT Root UI ttf files are hosted locally in /fonts.
   ───────────────────────────────────────────────────────────── */

@font-face {
  font-family: 'PT Root UI';
  font-weight: 400;
  font-style: normal;
  src: local('PT Root UI'),
       url("/fonts/regular.ttf") format('truetype');
  font-display: swap;
}
@font-face {
  font-family: 'PT Root UI';
  font-weight: 500;
  font-style: normal;
  src: local('PT Root UI Medium'),
       url("/fonts/medium.ttf") format('truetype');
  font-display: swap;
}
@font-face {
  font-family: 'PT Root UI';
  font-weight: 700;
  font-style: normal;
  src: local('PT Root UI Bold'),
       url("/fonts/bold.ttf") format('truetype');
  font-display: swap;
}

:root {
  /* ─────────────────────────────────────────────────────────────
     COLOR HIERARCHY
     ─────────────────────────────────────────────────────────────
     1. SURFACES (calm) — what 80%+ of every page is filled with.
        Off-white, soft lavender, white. The page reads quiet.
     2. INK — black + cool greys. Used for text & fine lines.
     3. HIGHLIGHT ACCENTS (loud) — acid-yellow + orange.
        Reserved for highlighter strokes under single phrases,
        small filled chips, callout numerals. Never base fills.
     4. SECONDARY ACCENTS — green, deep red, warm orange. Used in
        icons + small status dots only.

     RULE OF THUMB: a slide has at most one accent zone. If two
     phrases are highlighted on the same slide they share a colour
     (both yellow OR both orange — not a mix).
     ───────────────────────────────────────────────────────────── */

  /* ───── 1. Surfaces (the default background of any slide/page) ───── */
  --cq-surface-light:    #F6F5F1;   /* soft off-white, slightly warm — default page surface */
  --cq-surface-light-2:  #F9F9F9;   /* alt off-white (slightly cooler) */
  --cq-surface-paper:    #FFFFFF;   /* pure white — cards on top of off-white */
  --cq-surface-lavender: #B7B5F7;   /* lavender — the "contrast variant" full-bleed surface */
  --cq-surface-lavender-soft: #D6D5FA; /* lighter lavender — chip fills, soft cards */
  --cq-surface-cool:     #F0EEF4;   /* cool neutral — secondary panel */
  --cq-surface-invert:   #000000;   /* black panel — special / proof slides only */

  /* Legacy aliases (kept so existing markup keeps working) */
  --cq-bg:      var(--cq-surface-light-2);
  --cq-bg-cool: var(--cq-surface-cool);

  /* ───── 2. Ink ───── */
  --cq-black:      #000000;         /* reserved for headlines, fine outlines, highlight text */
  --cq-white:      #FFFFFF;
  --cq-grey-deep:  #1F1F1F;
  --cq-grey-text:  #595959;
  --cq-grey:       #9F9F9F;
  --cq-grey-light: #D0D1D5;
  --cq-grey-line:  #EDEEF0;

  /* ───── 3. Highlight accents — USE SPARINGLY ───── */
  --cq-acid-yellow:     #D0FF37;    /* signature highlighter — under a phrase, small chip */
  --cq-highlight-orange:#FC7C01;    /* alt highlighter — same role as yellow, warmer slides */
  --cq-orange:          #FC7C01;    /* alias (kept for backwards compat) */

  /* ───── 4. Secondary accents (icons, small dots, illustration fills) ───── */
  --cq-green:       #00B853;
  --cq-lavender:    #A7A7FF;        /* legacy alias — see --cq-surface-lavender */
  --cq-red:         #C53119;        /* deep red (logo carrot stripes) */
  --cq-orange-dark: #B34A01;        /* deep orange (logo) */
  --cq-orange-warm: #FF8833;        /* warm orange (bubble) */
  --cq-green-dark:  #007939;

  /* ───── Foreground tokens ───── */
  --cq-fg1: var(--cq-black);
  --cq-fg2: var(--cq-grey-text);
  --cq-fg3: var(--cq-grey);
  --cq-fg-on-black:    var(--cq-white);
  --cq-fg-on-lavender: var(--cq-white);  /* white on lavender — primary on contrast slides */
  --cq-fg-on-yellow:   var(--cq-black);
  --cq-fg-on-orange:   var(--cq-white);

  /* ───── Surface tokens (compat shims) ───── */
  --cq-surface:        var(--cq-surface-paper);
  --cq-surface-bg:     var(--cq-surface-light);
  --cq-surface-accent: var(--cq-surface-lavender); /* the "accent surface" is LAVENDER, not yellow */

  /* ───── Semantic ───── */
  --cq-success: var(--cq-green);
  --cq-warning: var(--cq-orange);
  --cq-info:    var(--cq-lavender);
  --cq-danger:  var(--cq-red);

  /* ───── Type ───── */
  --cq-font: 'PT Root UI', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;

  /* Type scale (desktop) — derived from page7 + page19 specimens */
  --cq-h1-size: 64px;   --cq-h1-lh: 1.0;   --cq-h1-tracking: -0.02em; --cq-h1-weight: 700;
  --cq-h2-size: 52px;   --cq-h2-lh: 1.04;  --cq-h2-tracking: -0.02em; --cq-h2-weight: 700;
  --cq-h3-size: 40px;   --cq-h3-lh: 1.06;  --cq-h3-tracking: -0.02em; --cq-h3-weight: 700;
  --cq-h4-size: 28px;   --cq-h4-lh: 1.1;   --cq-h4-tracking:  0;      --cq-h4-weight: 700;
  --cq-h5-size: 24px;   --cq-h5-lh: 1.2;   --cq-h5-tracking:  0;      --cq-h5-weight: 700;
  --cq-h6-size: 20px;   --cq-h6-lh: 1.2;   --cq-h6-tracking:  0;      --cq-h6-weight: 500;
  --cq-body-size: 16px; --cq-body-lh: 1.44;--cq-body-weight: 500;
  --cq-body-lg-size: 20px; --cq-body-lg-lh: 1.44;
  --cq-small-size: 14px;--cq-small-lh: 1.3;
  --cq-caption-size: 12px;--cq-caption-lh: 1.2;

  /* ───── Spacing ───── */
  --cq-space-1: 4px;
  --cq-space-2: 8px;
  --cq-space-3: 12px;
  --cq-space-4: 16px;
  --cq-space-5: 24px;
  --cq-space-6: 32px;
  --cq-space-7: 48px;
  --cq-space-8: 64px;
  --cq-space-9: 96px;

  /* ───── Radii ───── */
  --cq-radius-xs: 4px;
  --cq-radius-sm: 8px;
  --cq-radius-md: 12px;
  --cq-radius-lg: 20px;
  --cq-radius-xl: 28px;
  --cq-radius-pill: 999px;

  /* ───── Shadows / elevation ───── */
  --cq-shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
  --cq-shadow-md: 0 8px 24px rgba(0,0,0,0.06);
  --cq-shadow-lg: 0 78px 72px rgba(0,0,0,0.08);
  --cq-shadow-card: 2px 10px 26px rgba(92,92,214,0.12);

  /* ───── Borders ───── */
  --cq-border: 1px solid rgba(0,0,0,0.08);
  --cq-border-strong: 1.5px solid #000;
  --cq-border-line: 1px solid var(--cq-grey-line);

  /* ─────────────────────────────────────────────────────────────
     PRODUCT tokens — used INSIDE the app (Inbox, dashboards, etc.)
     The product palette is a separate, softer system than the
     marketing brand. Primary is INDIGO not acid-yellow; text and
     surfaces use cool charcoals/greys, not pure black/warm grey.
     Source: /uploads/Colors-0121e004.svg (product DLS sheet).
     ───────────────────────────────────────────────────────────── */

  /* Indigo — product primary */
  --pq-primary:        #5C5CD6;     /* default action / link */
  --pq-primary-hover:  #4949C2;
  --pq-primary-active: #2929A3;     /* pressed / dark variant */
  --pq-primary-bg:     #EBEBFA;     /* lightest surface */
  --pq-primary-bg-2:   #D6D6F5;     /* slightly stronger tint */

  /* Neutrals (cool, slightly indigo-tinted) */
  --pq-fg1:    #22252A;             /* primary text   (replaces pure black) */
  --pq-fg2:    #5C6370;             /* secondary text */
  --pq-fg3:    #9DA3AF;             /* tertiary / placeholder */
  --pq-border: #E3E5E8;
  --pq-border-strong: #C7CAD1;
  --pq-surface:    #FFFFFF;
  --pq-surface-2:  #F1F2F4;         /* page background / soft fills */
  --pq-surface-3:  #FFFFFF;
  --pq-surface-dark: #262633;       /* dark sidebar / inverted UI */

  /* Semantic — paired bg / fg per state */
  --pq-success:     #66CC66;
  --pq-success-fg:  #339933;
  --pq-success-bg:  #ECF9EC;
  --pq-warning:     #FFBB33;
  --pq-warning-fg:  #CC8800;
  --pq-warning-bg:  #FFF6E5;
  --pq-warning-bg-2:#FFEECC;
  --pq-accent:      #FF7733;        /* attention / new */
  --pq-accent-fg:   #CC4400;
  --pq-accent-bg:   #FFEEE5;
  --pq-danger:      #E04646;
  --pq-danger-fg:   #B33030;
  --pq-danger-bg:   #FCEBEB;

  /* ───── Layout ───── */
  --cq-content-max: 1200px;
  --cq-page-pad: 80px;
}

/* ─────────────────────────────────────────────────────────────
   Semantic typography classes
   ───────────────────────────────────────────────────────────── */
.cq-h1, h1.cq, .cq-display {
  font-family: var(--cq-font);
  font-weight: var(--cq-h1-weight);
  font-size: var(--cq-h1-size);
  line-height: var(--cq-h1-lh);
  letter-spacing: var(--cq-h1-tracking);
  color: var(--cq-fg1);
  margin: 0;
}
.cq-h2, h2.cq {
  font-family: var(--cq-font);
  font-weight: var(--cq-h2-weight);
  font-size: var(--cq-h2-size);
  line-height: var(--cq-h2-lh);
  letter-spacing: var(--cq-h2-tracking);
  color: var(--cq-fg1);
  margin: 0;
}
.cq-h3, h3.cq {
  font-family: var(--cq-font);
  font-weight: var(--cq-h3-weight);
  font-size: var(--cq-h3-size);
  line-height: var(--cq-h3-lh);
  letter-spacing: var(--cq-h3-tracking);
  color: var(--cq-fg1);
  margin: 0;
}
.cq-h4, h4.cq {
  font-family: var(--cq-font);
  font-weight: var(--cq-h4-weight);
  font-size: var(--cq-h4-size);
  line-height: var(--cq-h4-lh);
  color: var(--cq-fg1);
  margin: 0;
}
.cq-h5, h5.cq {
  font-family: var(--cq-font);
  font-weight: var(--cq-h5-weight);
  font-size: var(--cq-h5-size);
  line-height: var(--cq-h5-lh);
  color: var(--cq-fg1);
  margin: 0;
}
.cq-body, p.cq {
  font-family: var(--cq-font);
  font-weight: var(--cq-body-weight);
  font-size: var(--cq-body-size);
  line-height: var(--cq-body-lh);
  color: var(--cq-fg1);
  margin: 0;
}
.cq-body-lg {
  font-family: var(--cq-font);
  font-weight: 500;
  font-size: var(--cq-body-lg-size);
  line-height: var(--cq-body-lg-lh);
  color: var(--cq-fg1);
}
.cq-small {
  font-family: var(--cq-font);
  font-weight: 500;
  font-size: var(--cq-small-size);
  line-height: var(--cq-small-lh);
  color: var(--cq-fg2);
}
.cq-caption {
  font-family: var(--cq-font);
  font-weight: 500;
  font-size: var(--cq-caption-size);
  line-height: var(--cq-caption-lh);
  color: var(--cq-fg3);
}

/* ─────────────────────────────────────────────────────────────
   Highlighter strokes (signature)
   The brand's emphasis device. Apply to a SINGLE phrase inside a
   headline — never to whole paragraphs, never to a chip's full
   label. Choose ONE colour per slide; never mix yellow + orange.
   ───────────────────────────────────────────────────────────── */
.cq-highlight {
  background: var(--cq-acid-yellow);
  color: var(--cq-black);
  padding: 0 0.15em;
  box-decoration-break: clone;
  -webkit-box-decoration-break: clone;
}
.cq-highlight--orange {
  background: var(--cq-highlight-orange);
  color: var(--cq-white);
  padding: 0 0.15em;
  box-decoration-break: clone;
  -webkit-box-decoration-break: clone;
}
/* Optional rough/skewed variant — feels hand-drawn, like a marker stroke. */
.cq-highlight--skew {
  display: inline-block;
  transform: rotate(-1.5deg);
  padding: 0 0.18em 0.05em;
}

/* ───── Pill chip ───── */
.cq-chip {
  font-family: var(--cq-font);
  font-weight: 500;
  font-size: 16px;
  line-height: 1;
  border-radius: var(--cq-radius-pill);
  padding: 8px 24px;
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: var(--cq-black);
  color: var(--cq-white);
}
.cq-chip--light { background: var(--cq-white); color: var(--cq-black); }
.cq-chip--yellow{ background: var(--cq-acid-yellow); color: var(--cq-black); }

/* ───── Buttons ───── */
.cq-btn {
  font-family: var(--cq-font);
  font-weight: 500;
  font-size: 16px;
  line-height: 1;
  border-radius: var(--cq-radius-pill);
  padding: 14px 28px;
  border: none;
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  gap: 8px;
  transition: transform .12s ease, background .15s ease, box-shadow .15s ease;
}
.cq-btn:active { transform: translateY(1px) scale(.99); }
.cq-btn--primary { background: var(--cq-acid-yellow); color: var(--cq-black); }
.cq-btn--primary:hover { background: #BDF015; }
.cq-btn--dark { background: var(--cq-black); color: var(--cq-white); }
.cq-btn--dark:hover { background: #1F1F1F; }
.cq-btn--outline { background: transparent; color: var(--cq-black); border: 1.5px solid var(--cq-black); }
.cq-btn--outline:hover { background: var(--cq-black); color: var(--cq-white); }
.cq-btn--lg { font-size: 18px; padding: 18px 32px; }
.cq-btn--sm { font-size: 14px; padding: 10px 18px; }

/* ───── Card ───── */
.cq-card {
  background: var(--cq-white);
  border-radius: var(--cq-radius-lg);
  padding: 32px;
}
.cq-card--shadow { box-shadow: var(--cq-shadow-md); }
.cq-card--bg-cool { background: var(--cq-bg-cool); }
.cq-card--invert { background: var(--cq-black); color: var(--cq-white); }
.cq-card--invert .cq-h1, .cq-card--invert .cq-h2, .cq-card--invert .cq-h3,
.cq-card--invert .cq-h4, .cq-card--invert .cq-h5, .cq-card--invert .cq-body { color: var(--cq-white); }

/* ───── Background patterns ───── */
.cq-pattern-dots {
  background-image: radial-gradient(rgba(0,0,0,0.18) 1.2px, transparent 1.2px);
  background-size: 18px 18px;
}
.cq-pattern-grid {
  background-image: linear-gradient(rgba(0,0,0,0.08) 1px, transparent 1px),
                    linear-gradient(90deg, rgba(0,0,0,0.08) 1px, transparent 1px);
  background-size: 32px 32px;
}
.cq-bg-lavender-fade {
  background: linear-gradient(180deg, var(--cq-lavender) 0%, var(--cq-white) 100%);
}

/* ─────────────────────────────────────────────────────────────
   Slide / panel surface modes
   The two default backgrounds for a slide or full-bleed section.
   Apply to the section root. Both pair with the dot pattern.
   ───────────────────────────────────────────────────────────── */
.cq-slide--light {
  background-color: var(--cq-surface-light);
  color: var(--cq-fg1);
}
.cq-slide--lavender {
  background-color: var(--cq-surface-lavender);
  color: var(--cq-fg-on-lavender);
}
.cq-slide--lavender .cq-h1,
.cq-slide--lavender .cq-h2,
.cq-slide--lavender .cq-h3,
.cq-slide--lavender .cq-h4,
.cq-slide--lavender .cq-h5,
.cq-slide--lavender .cq-body { color: var(--cq-fg-on-lavender); }

/* Dot pattern tuned for both surface modes (subtle on light, lighter on lavender). */
.cq-slide--light.cq-pattern-dots {
  background-image: radial-gradient(rgba(0,0,0,0.14) 1.2px, transparent 1.2px);
  background-size: 22px 22px;
}
.cq-slide--lavender.cq-pattern-dots {
  background-image: radial-gradient(rgba(255,255,255,0.5) 1.2px, transparent 1.2px);
  background-size: 22px 22px;
}
</style>


<style>
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    font-family: var(--cq-font);
    background: var(--pq-surface-2);
    color: var(--pq-fg1);
    -webkit-font-smoothing: antialiased;
  }
  #root { height: 100vh; min-height: 640px; }
  button { font-family: inherit; }
  input { font-family: inherit; }
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-thumb { background: #C7CAD1; border-radius: 99px; border: 2px solid transparent; background-clip: content-box; }
  ::-webkit-scrollbar-track { background: transparent; }

  /* ───────────────── onboarding shell ───────────────── */
  .ob-root {
    height: 100%;
    display: flex;
    /* tweakable vars set inline on this node */
    --accent: #5C5CD6;
    --accent-ink: #fff;
    --r-btn: 6px;
    --r-input: 8px;
    --r-card: 12px;
    --r-chip: 6px;
    --fz: 15px;
    --gap: 1;
    --tint: color-mix(in srgb, var(--accent) 9%, #fff);
    --tint-2: color-mix(in srgb, var(--accent) 16%, #fff);
    font-size: var(--fz);
  }

  /* ── left rail ── */
  .ob-rail {
    width: 332px;
    flex-shrink: 0;
    background: var(--pq-surface-dark);
    color: #fff;
    display: flex;
    flex-direction: column;
    padding: calc(40px * var(--gap)) 34px calc(32px * var(--gap));
    position: relative;
    overflow: hidden;
  }
  .ob-rail-bg {
    position: absolute; inset: 0;
    background-image: radial-gradient(rgba(255,255,255,0.05) 1.2px, transparent 1.2px);
    background-size: 22px 22px;
    pointer-events: none;
  }
  .ob-rail-logo { position: relative; }
  .ob-rail-logo img { height: 26px; display: block; }
  .ob-rail-kicker {
    position: relative;
    margin-top: calc(40px * var(--gap));
    font-size: 12px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--accent);
  }
  .ob-rail-kicker.muted { color: rgba(255,255,255,0.45); }
  .ob-rail-head {
    position: relative;
    margin-top: 10px;
    font-size: calc(var(--fz) * 1.5);
    font-weight: 700; line-height: 1.2; letter-spacing: -0.01em;
    max-width: 230px;
  }

  /* ── stepper ── */
  .ob-steps { position: relative; margin-top: calc(44px * var(--gap)); display: flex; flex-direction: column; }
  .ob-step { display: flex; gap: 14px; align-items: flex-start; padding-bottom: calc(26px * var(--gap)); position: relative; }
  .ob-step:last-child { padding-bottom: 0; }
  .ob-step .line {
    position: absolute; left: 13px; top: 28px; bottom: 2px; width: 2px;
    background: rgba(255,255,255,0.12);
  }
  .ob-step.done .line { background: var(--accent); }
  .ob-step:last-child .line { display: none; }
  .ob-step .num {
    width: 28px; height: 28px; border-radius: 999px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 700;
    border: 2px solid rgba(255,255,255,0.18);
    color: rgba(255,255,255,0.5);
    background: transparent;
    z-index: 1; transition: all .35s cubic-bezier(0.2,0.7,0.2,1);
  }
  .ob-step.active .num { border-color: var(--accent); color: #fff; background: color-mix(in srgb, var(--accent) 30%, transparent); }
  .ob-step.done .num { border-color: var(--accent); background: var(--accent); color: var(--accent-ink); }
  .ob-step .stxt { padding-top: 3px; }
  .ob-step .stitle { font-size: var(--fz); font-weight: 500; color: rgba(255,255,255,0.55); transition: color .3s; line-height: 1.2; }
  .ob-step.active .stitle, .ob-step.done .stitle { color: #fff; }
  .ob-step .sdesc { font-size: 12.5px; color: rgba(255,255,255,0.4); margin-top: 3px; line-height: 1.3; }

  /* progress: bar variant */
  .ob-railbar { position: relative; margin-top: calc(44px * var(--gap)); }
  .ob-railbar .track { height: 4px; border-radius: 99px; background: rgba(255,255,255,0.14); overflow: hidden; }
  .ob-railbar .fill { height: 100%; background: var(--accent); border-radius: 99px; transition: width .5s cubic-bezier(0.2,0.7,0.2,1); }
  .ob-railbar .pct { margin-top: 12px; font-size: 13px; color: rgba(255,255,255,0.55); font-weight: 500; }
  .ob-railbar .pct b { color: #fff; font-weight: 700; }
  /* progress: dots variant */
  .ob-raildots { position: relative; margin-top: calc(44px * var(--gap)); display: flex; gap: 10px; align-items: center; }
  .ob-raildots .dot { width: 9px; height: 9px; border-radius: 99px; background: rgba(255,255,255,0.2); transition: all .35s; }
  .ob-raildots .dot.active { background: var(--accent); width: 28px; }
  .ob-raildots .dot.done { background: var(--accent); }
  .ob-raildots-lbl { position: relative; margin-top: 16px; font-size: var(--fz); font-weight: 500; color: #fff; }
  .ob-raildots-lbl span { color: rgba(255,255,255,0.45); }

  .ob-rail-foot {
